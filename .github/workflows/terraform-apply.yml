name: Terraform Apply

# Manual only — never applies on push/merge. You review the plan, then re-run with run_apply=true.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        default: prod
        options:
          - prod
          - dev
      run_apply:
        description: Run apply after plan (set true only after reviewing the plan job output)
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ap-south-1
  TARGET_ENV: ${{ github.event.inputs.environment }}

concurrency:
  group: terraform-apply-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config=../../bootstrap/examples/backend.${{ github.event.inputs.environment }}.hcl

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -var-file=ci.tfvars -out=tfplan | tee plan.txt
          echo "plan_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Publish plan to job summary
        if: always()
        run: |
          if [ -f plan.txt ]; then
            {
              echo "### Terraform plan — ${{ github.event.inputs.environment }}"
              echo ""
              echo '```hcl'
              head -c 60000 plan.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            environments/${{ github.event.inputs.environment }}/tfplan
            environments/${{ github.event.inputs.environment }}/plan.txt
          retention-days: 14

  apply:
    name: Apply (${{ github.event.inputs.environment }})
    needs: plan
    if: github.event.inputs.run_apply == true
    runs-on: ubuntu-latest
    # Optional approval gate (GitHub Pro+ on private repos, or free on public repos).
    # Configure required reviewers under Settings → Environments → production / development.
    environment: ${{ github.event.inputs.environment == 'dev' && 'development' || 'production' }}

    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: environments/${{ github.event.inputs.environment }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config=../../bootstrap/examples/backend.${{ github.event.inputs.environment }}.hcl

      - name: Terraform apply
        run: terraform apply -input=false -no-color -auto-approve tfplan
