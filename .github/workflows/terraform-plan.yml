name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to plan
        type: choice
        required: true
        default: prod
        options:
          - prod
          - dev

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ap-south-1

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.environment) || '["prod","dev"]') }}

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config=../../bootstrap/examples/backend.${{ matrix.environment }}.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=ci.tfvars -out=tfplan | tee plan.txt

      - name: Publish plan to job summary
        if: always()
        run: |
          if [ -f plan.txt ]; then
            {
              echo "### Terraform plan — ${{ matrix.environment }}"
              echo ""
              echo '```hcl'
              head -c 60000 plan.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}-${{ github.run_id }}
          path: |
            environments/${{ matrix.environment }}/tfplan
            environments/${{ matrix.environment }}/plan.txt
          retention-days: 14

      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && matrix.environment == 'prod'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'environments/prod/plan.txt';
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : 'Plan output not found.';
            const body = [
              '### Terraform plan — prod',
              '',
              '> **Apply is manual.** Merge does not deploy. Use **Actions → Terraform Apply** when ready.',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan.slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
